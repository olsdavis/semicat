# @package _global_

defaults:
  - override /data: text8
  - override /model: text8_duo
  - override /trainer: default

seed: 12345

trainer:
  min_epochs: 100
  max_epochs: 500
  precision: bf16-mixed
  accumulate_grad_batches: 4

model:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1e-4
    weight_decay: 0.0

tags: ["semicat", "text8", "duo"]

data:
  batch_size: 256  # to fit on 20GB

logger:
  wandb:
    group: text8_duo_BB
    name: ${logger.wandb.group}-${seed}
    tags: ["semicat", "text8", "duo"]
