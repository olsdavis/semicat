# @package _global_

defaults:
  - override /data: text8
  - override /model: text8_semicat_song
  - override /trainer: default

seed: 12345

trainer:
  min_epochs: 100
  max_epochs: 500

model:
  net:
    _target_: semicat.net.mysong.MySongUNet

tags: ["semicat", "text8", "mysong"]

logger:
  wandb:
    group: semicat_sd_text8-mysong
    name: semicat-sd-text8-mysong-${seed}
    tags: ["semicat", "text8", "mysong"]
