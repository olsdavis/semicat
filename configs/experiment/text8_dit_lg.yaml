# @package _global_

defaults:
  - override /data: text8
  - override /model: text8_dit_lg
  - override /trainer: default

seed: 12345

trainer:
  max_steps: 500000
  precision: bf16-mixed

model:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1e-4
    weight_decay: 0.0
  net:
    length: ${data.k}
  compile: true
  calc_nll: false
  nll_samples: 16

tags: ["semicat", "text8", "duo"]

data:
  batch_size: 512

logger:
  wandb:
    group: text8_dit_lg
    name: ${logger.wandb.group}-${seed}
    tags: ["semicat", "text8", "duo"]
